  text: 上清太上八素真經遜八
  hash: sha256:767e21e76ff0a1b94c5364ea6e7a3038571d2879b7fa903b9437cb5212b62fb7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0110_HFL_000-001a, image: hfl/0194/0194-098.png}
body:
  text: 太上隱書八素真經者乃玄清玉皇之道也上皇天帝以此書授太微天帝君三元紫精道君真陽元老君此君受書施行道成後以付太上道君太上道君以傳金闕後聖李君李君以付太虛真人南嶽赤君使下授學道宿有金名玉字高閣刻名當為真人者太上之隱文不傳於地仙地仙亦自不得獲之矣太上曰夫五星者是日月之靈根天胎之五藏也是以天精結纏以成五星天地賴以綜氣日月繫之而明若夫天氣不育則三合虧盈地氣不育則萬物枯滯虧盈則天震地動若夫列宿不守則日月薄蝕五星亂度則二象失光天地泰則五星映清天精合則五星光明星之靈道太山上應德神玉清上照太虛下朗萬兆兆有得失則五度錯逆兆有和吉則流行順道映洞禍福毫縷畢彰玄照纎末幽存功過者也五帝上言於星中真皇真皇上奏於太上玉君是以辰光轉燭以示萬生傍行越位以告災祥也地建五嶽之山以象五行之星人立五臟之神以擬五行之用三氣回合是以天地列備矣星之為精上通衆精下共光津吐納則三華漱澤萬靈傍達三六中含養生其事洞而微極其器浩而長攬也仙人唯知飛丹召霜煎鍊雲朱水玉解金九爐炎霄勤苦極於營贍司候足於劬勞就有成者不過升身上天超躍玄洲耳此故仙人而巳遠可遊於九宫之間矣則未有得真人之門户也吾今有一道乃為上真之法不但中真而巳子乃欲招致五星與同輦駕三素以上騰坐八景以遊盻登太帝之西墉縱形太空白日登晨乎吾昔受之於玉皇行之迄今四十六萬年而不休者玩此道之奇妙樂五星之接遇也既得分形億兆生雲育澤上遊玉清下看太極矣遂為太上之真人者致五星之精也隱祕妙術藏之雲閣藴抱靈訣與之俱遊者矣子當下封萬生為十天之帝玄名碧書早刻瓊閣宜令初學真人受此祕章令子傳付施行必當得人此書是上真之訣不得傳地仙之夫也出傳之始皆當須玄應感悟靈告其人乃當清齋委約誓盟三天七百年中得三傳限盡藏之五嶽不復得出也泄漏天文隱書巳告天帝誅其三祖又下三官絶其身命生被水火死為下鬼矣諸學真之人而受此書皆有太帝目名西華宫有琅簡蘂書於紫宫當為真人者乃得此文也乃是子未生之前五千歲巳有玄名定録當遇此經也子勿以始受此書而謂非宿命之分矣玉皇下盻遊生見有得此書者即告太上使遣飛靈玉童三十六人侍此書之所在處也又告太極遣南陵玉女三十二人衛此五星真君君夫人之名字也又並使玉童玉女衛護有書之身有書皆盛以别笈開發省按皆向書再拜燒香左右玉童玉女司視功過察人誠向有違有善徑聞太上不可不愼修行此道五年之中玉童玉女見形為子使役行之十四年道成得與五星同輿上詣玉清宫夫上真之道有七太上之道有三中真之道有六下真之道有八上真之道有七列篇目于左第一曰太上鬱儀奔日文第二曰太上結璘奔月章第三曰太上八素奔辰隱書第四曰太微帝君飛天綱上經第五曰高上大洞真經三十九章第六曰金闕靈書紫文上經第七曰黃老八道九真中經右上真之道總而行之為上清真人給玉童玉女各三千人位為諸天帝之位行則三色之節從羣神萬真前導鳯歌後從玄鈞白虎啓路飛龍翼轅太上之道有三列篇目于左玉清隱書神虎大符金虎真符右太上之道總而行之為太上之道給玉童玉女各二千人位為上真玉皇之君行則五色神節從千真羣仙前導天鈞後從鸞歌三真侍轅騰翥九天中真之道有六列篇目于左太丹隱書朝真上經玉帝神符三天正法鳯真之文九真升玄文三元布經四真之章太上金䇿方諸洞房玉字上經六甲靈飛靈寶祕文三皇內文天文大字青要紫書曲素訣辭三五順行右中真之道總而行之則為上清中道真人給玉童玉女各一千人位為上清左右卿相之師行則紫毛之節從萬神千真前吹鳯鳴後奏天鈞玄龍啓道五帝驂軒飛行太空遨戲丹霄下真之道有八列篇目于左上清九化十變三九素語丹景道精隱地八術天關三圖玄皇玉書神州七變七轉洞經紫度中方石精玉馬之母絳録黃道玉目龍書衆文素奏中章五行祕符五帝玉玄上元五書右下真之道總而行之則為上清下元真人給玉童玉女五百人位為上清左右大夫之官行則五色之節從衆神玉女前嘯九鳳後吹八鸞白虬啓道太極驂軒飛行倒景遨遊紫房上清上真中道真人下元真人所應施修道經各有篇目分别為部第令相隨也若總修一真之事者當盡得一真之部書兼而行之則為上清真人若所得書不備具或得上經或得中篇或得下文雖專修行而闕其餘者但可飛仙而巳遠詣太極下遊五嶽自不得為上清三真也子當勤心天地啓告神玄遠遊名山祝願千靈尋求寶文令道德備焉既修行一部上登上清所給玉童玉女便有千數百矣若偏得一書而不都具則玉童玉女故自依所受書限而給衛之耳唯修太上鬱儀奔日文結璘奔月章八素奔辰隱書便登上清為下元真人以不盡修上真之事故也過其餘者皆應兼修兼修道成乃升上清若都總修三真之道經聞見玉清之隱書佩神虎之大符便上為玉皇之君太上之真給玉童玉女三萬人遨遊高上之闕出入玉清之宫於是天帝太微君來受事於玉皇焉玉清隱書有四卷乃高上玉皇昔受之於玉玄太皇道君禁書也玉皇君所寶妙者也以付太極四真人使掌祕藏之五千年內聽三授授於上清之玉真人也若一千年中過三人亦聽之也授限訖不得復傳世俗之中千萬之人時有一人當為天真所授以得此書者太上玄臺巳有玉名當為上真故也有書者在家給玉童三百人玉女三百人旦夕當致衆真仙神名山之靈詣其寢房論道講德矣此謂有書者在家處俗未去學道時也若登山尋真研味靈文則威制六天役使山神五嶽來朝玉童玉女形見奉衛侍真燒香太上神虎符太上虛皇道君以授於太上也太上道君以付三天真皇使授諸真人及天帝衆官也此符有真名於上清者皆受佩之也但有此符而無玉清隱書者皆不得為上清之真但太極之上真耳太微天帝金虎符太上玉真保皇道君以授於太上太微天帝君也天帝有三十六其太微天帝最尊貴諸天帝皆詣受事矣受此符皆威制萬神使役千靈龍虎衛從得乘三素之雲上升太極上清拜為左公玉清隱書玄遠絶邈下真及飛仙之徒便當息心於無窮之冀耳神虎符金虎符飛仙輩勤求不巳或有得理矣自無玄名靈籙復求不與此文相遇者比肩也况玉清之道乎太上曰昔謂太清不可登而况於太極乎乃謂上清不可聞而况於玉清乎明真中有高卑玄中有階次也過此以前非所復議玉清宫之下真人上清宫之上真人太極宫之真人乃上清宫之下真人太清宫之上真人乃太極宫之下真人從此以下次得九官之飛仙也玉清隱書當傳之時太極四真人各奉執一卷以上呈上皇高上玉皇玉玄四道君探按金格玉名當為上真玉君者然後乃出傳之耳有此者立致衆真仙人來詣其房寢若修至道太上不復試其情狀也是宿有金格玉名必當為上真故也玉清隱書道妙於鬱儀文矣有太上鬱儀奔日文結璘奔月章八素奔辰經修行其法太極真人不復下試有大洞真經者修行其法七祖父母皆離脫鬼名原貸三官考謫度録仙府解釋艱羅使詣朱火丹陵宫受學仙道仙道成使翼佐五帝為九宫之仙也謂其人備大洞真經者也此書依四極定法偏為其七祖獲仙不同於他經矣甚不可不修行也若既修之而被試不過或偏行一道或中路而息者自救不暇亦不能為其七世致仙也夫鬼可以學仙如人可以學道七世立德故慶流子孫令致神仙也一身修道備明洞經者則祚及七祖故當反此胎形以為仙官耳中央黃老君以此洞經之妙而為七世獲福尤深祕之與鬱儀文同笈上清衆真亦貴此道以其功加於七祖德升於上世故也後聖李君奉受八素真經奔辰隱書施行其法乃致太微天帝下迎五星同輿乘華三素上登玉清受書為上清金闕帝君登飛木星之道歲星圓鏡木精玄朗東陽之陔星中有九門門中出九鋒芒鋒芒光垂九百萬丈一門輒有一青帝備門奉衛於中央青皇真君也中央有始陽上真青皇道君諱澄瀾字清凝夫人諱寶容字飛雲治在木星之內鎮守九門運青光流鋒以照上下之真欲飛登之法常思見歲星當正心視星以右手拊心而禮之左手掩兩目乃九閉氣又叩齒二十七通咽液九過使目閉於手下心呼歲星中真皇之君君夫人名諱字三過畢曰願得與始陽青皇真君君夫人共乘八景碧輿上登太上宫言畢乃臨閉目於手下向星微祝曰天地交和精流東方仰望九門飛霞散鋒始陽碧臺中有青皇青牙垂暉映照九方鬱察夫人字曰飛雲齊服靈錦龍帔虎裙腰帶鳯符首巾華冠出無入虛遨遊太元前䇿青帝後從千神來見迎接得為飛真上登玉清高上之房祝畢去手臨目對星服星之光二十七吞存視星九芒使盡來入喉中也都畢又叩齒三通常行之十四年木星中青皇大君奏聞高上玉清宫刻太微蘂簡定名玉書位為上清上飛真人木星有九門門內有九青帝其一帝輒備一門以奉承於中央青皇上真大君也青皇者東方之上真始精之尊神也出入玉清與高上為犮也其門內青帝或號青靈之公或號青神或號青精或號青帝之君並受事於中央青皇也行八素之祕道則致青皇來降巳行五靈之外法者則致青神來授書是故道有深淺致有尊卑天無星之時天𩃬之夕可於寢室中向東存修而祝也天道微妙玄綱毫分不必對星而行之也有星時可出庭中坐立適意所謂上真之道登東辰之法不傳地仙輩也飛登火星之道火星玄鏡丹精映觀南軒星有三門門中出三鋒芒光垂三百萬丈一門內輒有一赤帝凡三赤帝備門奉衛於南真上皇真君星中央有丹火朱陽赤皇上道真君諱維渟字散融夫人諱華瓶字玄羅治在火星內鎮守三門運赤光飛雲以朗天下之真人也欲飛登之法思見熒惑星正心視星以左手拊心而禮之右手掩口乃三閉氣又叩齒二十七通咽液九過臨閉兩目心呼熒惑真皇君熒惑夫人諱字三過畢曰願得與丹火赤皇君君夫人共乘八景丹輿上登玉清宫畢乃向星微祝曰玄象流映丹光南冥仰望三門朱雲絳城中有丹皇名曰維渟夫人內照是為華瓶齊服雲霜鳯華龍鈴腰帶虎書首巾飛青出元入玄翺翔五城首導赤帝後從六丁來見招延得真之名上登玄虛金書玉清祝畢去手勿復掩口故臨目視星服星之光二十七吞存令星三芒盡來入喉中都畢又叩齒三通常行之十四年熒惑星中赤皇上真道君奏聞三元玄上宫刻玄圃瓊簡定名金書位為上清上飛真人熒惑星有三門門內有三赤帝其一帝輒備一門以奉屬於中央赤皇君也赤皇者南方之上真丹宫之貴神出入玉清與三元上皇為犮也其星中赤帝君者或號赤靈之公或號赤神或號赤精或號赤帝並受事於中央赤皇上真大君子行八素之隱書則致赤皇來降巳行五靈之外法則致赤神來授書是以道有隱外文有祕顯爾乃招真有尊卑之差求神有上下之序若無星之時天隂之夕可於寢室南向存之有星可出中庭坐立任意此所謂奔南辰之法不傳地仙傳之犯泄漏之罪地仙自復有八素經論服王氣吐納之道也又有九素經論召鬼使精行廚檢魂魄之事正陸行名山長生不死而巳八素經後有天鈞上曲陽歌九章九素經後有鳯吹龍嘯隂歌八章此是地仙之祕書也今所謂太上奔辰八素行上清之道非地仙之八素也地仙之嘯歌以待上清之行遊耳飛登金星之道太白星圓鏡金精煥耀西辰太白星中有七門門中有七鋒芒鋒芒光垂七百萬丈一門內各有一白帝凡有七白帝備門奉衛於西真上皇道君星中央有大素少陽白皇上真道君諱寥凌字振尋夫人諱飊英字靈恩治在金星之內鎮守七門運白光飛精以映上元真人欲飛登之法思見太白星當正心視星以右手拊心而禮之左手掩兩鼻孔乃七閉氣又叩齒二十七通咽液九過臨閉兩目心存太白真皇君君夫人諱字三過畢曰願得與大素少陽君君夫人共乘八景素輦上登玉清宫畢又向星微祝曰七氣豔飛光照西方仰望七門靈闕激鋒素暉燭映德標金宗中有少陽號曰白皇夫人靈恩治在玉房齊服皓錦流鈴虎章首巾扶晨腰佩金鐺出空入虛遊步玉剛前導白帝後從六庚來下見迎北登墉宫名書上清得為真公呪畢去手勿復掩鼻故臨兩目視星服星之光芒二十七吞存令七芒盡來入喉中都畢乃又叩齒三通常行之十四年太白星中少陽白真上皇君奏聞太帝玉皇宫刻上清金閣定名玉簡位為上清左真公以綜太極太白星有七門門內有七白帝其一帝輒備一門以奉屬於中央白皇道君也白皇者西方之上真太素之尊皇出入玄清與皇初道君為犮也其門內白帝君或號白靈之公或號白神或號白精或號白帝之君並受事於中央白皇上真大君也行八素之祕妙則致白皇來降巳行五靈之外道則致白神來授書尊卑玄盻故道有淵階矣若無皇之時天隂之夕可於寢室中西向存之有星可出庭中坐立任意若靜齋道士亦可通於室中存五星之真方面而並修之也皆上真之道奔西辰之法不傳地仙一夕服五星令常周遍春服星光以東方為始夏服星光以南方為始隨王月以王星為先口訣也星行不必在方面亦隨星所在向而修行口訣也行事時不欲令人見其所為當隱僻而為之也此是太上之隱道所謂隱書者也隱而復隱猶恐鬼神𥨸看其篇題何可令世之臭骸輕傳授者聞此標迹者乎不可以盲瞽愚人云無所知而令見其首題其人身中亦有七神見之亦為泄漏不可不深慎也修隱書之道而發泄隱書之名目者既當受考三官又適足以作禍也每欲省按皆先屏左右人及雞犬之生物燒香再拜乃視之也飛登水星之道辰星圎鏡水精洞映北冥辰星中有五門門中出五鋒芒鋒芒光垂五百萬丈一門各有一黑帝凡五黑帝並備門奉衛於北真上皇星中央有太玄隂元黑皇道君諱啓喧字精淳夫人諱玄華字龍娥治在水星之內鎮守五門之中運玄光流明之氣以朗耀北元之庭當為真人者欲飛登之法思見水星正心視星以兩手拊心拊心畢舉兩手以掩兩耳乃五閉氣又叩齒二十七通咽液九過臨閉兩目心呼辰星真皇君君夫人名字三過畢曰願得與君君夫人共乘八景蒼輿上登上清上元宫畢又向星微祝曰五氣玄飛光流北方仰望五門蒼闕鬱繁激芒達觀靈映景雲中有黑皇厥字精源龍娥紛藹俱理玄關齊服蒼帔紫錦緋裙腰佩虎符首巾蓮冠出凌九虛入響玉津前導黑帝後從六壬來下見迎上登紫房名書太上得為玉真祝畢去手勿復掩耳故臨目視星服星之光芒二十七過存令五芒盡來入喉中都畢又三叩齒常行之十四年辰星中太玄上皇真君奏聞高上宫刻琳房玉札定玉清紫文位為上清真公辰星有五門門內有五黑帝其一帝輒備一門以奉屬於中央玄皇君也玄皇者北方之上真太玄之尊君出入上虛與紫精道君為犮也其備門黑帝或號為黑靈之公或號黑神或號黑精或號黑帝君並受事於中央太玄黑真上皇君行八素之隱道則致北皇來降巳行五靈之外法則致黑帝君來授書尊卑差序故道有隱顯焉若天隂夕及無星見之時可於室中寢處常修之此高上之祕道奔登北辰之法也非地仙陸行所得聞者也玉清上清太極太清九宫並各有官僚公卿大夫俠伯置署如一更相管統奉屬於上宫闕次第類相似但道有尊貴德業有升降飛登土星之道鎮星圓鏡土精鎮廕黃道鎮星中有四門門中有四鋒芒鋒芒光垂四百萬丈一門各有一黃帝凡四黃帝備門奉衛於鎮元黃真君也星中央有中黃真皇道君諱藏睦字耽延夫人諱空瑶字非賢治在鎮星之內鎮鑒四門運黃裳流氣朗映中元照盻學真者欲飛登之法思見鎮星正心視星以兩手拊心拊心畢舉左手以掩洞房上乃四閉氣又叩齒二十七通咽液九過臨閉兩目心呼鎮星真君君夫人諱字三過畢曰願得與中央太皇道君君夫人共乘八景金輿上登上清宫畢又向星微祝曰四氣徘徊合注中元仰望九極傍觀四門黃臺紫房乘鋒散芒靈光鬱散天華落瓫中有黃皇厥字耽延夫人潛德是為非賢理和命氣導玄灌元齊服黃雲龍錦虎裙腰佩金符首巾紫冠出凌玄空展光金門前導黃帝六巳衛軒來下見迎上登天闕金書太上琅簡刻名飛行太空得為玉卿祝畢去手勿復掩洞房上故臨兩目服星之光二十七遍存令四芒盡來入喉中都畢又三叩齒常行之十四年鎮星中黃上真皇君奏聞太上宫刻霄臺碧簡定九玄丹文位為上清真公下犮四極上真人鎮星中有四門門內有四黃帝其一帝輒備一門以奉屬於中央黃真皇君也中央黃真上皇者中極之高尊出入太微與皇初道君為友也其黃帝守門或號曰黃靈之公或號黃神或號黃精或號黃帝君並受事於中黃上真之君也行八素之祕道則致黃真道君來迎巳行五靈之外法則致黃帝來授書矣天隂無星之時皆於寢室施行同存五方也真人云在室內存星亦不異於見星也勿謂不見星而當廢之也此太上之隱道登辰之祕法矣吞服星光芒時當悉存星真上皇皇夫人乘光中來下入口咽之臨目髣佛如有其形也此李君口訣恆修太上隱法招存五星之上皇者五年之中髣佛形見七年都見與之周行十四年五皇一合來下共乘玄華之輿三素紫雲前導五帝後從萬真五皇攜之共載白日登辰上朝玊清授書為上清上真人太上隱書五皇上真五通之日太上祕此日不以告九宫中仙人真人唯有太玄玉書金閣刻名者當其遇逢乃知其日耳夫五通者天精開暢上真吉會羣靈萬仙相慶之日也正月六日日中二月一日晡時三月七日夜半四月九日食時五月十五日夜半六月三日中時七月七日夜半八月四日中時九月二十日平旦十月一日平旦十一月六日夜半十二月十二日夜半此十二月五星中上皇太真道君俱登上清玉清見九玄太上道君又千真三十六天帝下逮太清飛仙以上並慶會太極上宫又論世上求真之勤懈紀書學真者之玊名當刻之金閣定書蘂簡文論求真者七祖之功過罪謫之深淺校罪多少使真有數品若七世無罪身又精勤皆當書以蘂簡刻以瓊文位為上清左真公若七世多罪身雖精勤故為下真耳若先世積罪已又多罪雖末精勤乃成下仙也罪之先著非功所消過之深重非勤可除夫五通者消罪除過之吉會子知其日則有冀也蓋五真上朝是為五通通達逺聽毫末皆照也子乃欲以其日請乞七祖之罪咎巳身之宿過手吾當旨告三官乞除刑謫徑告天帝削除罪録原其徒役散其厄書使汝七祖縱任優遊自樂子既得真上世獲福當可乎今使汝一身啓顙而慶及於七考乃要道也若汝妄泄及此日為五通日者方更增罪四等雖謝過千萬無益於為有也真人閉口而自書執之於空地猶恐百蟲濫眄其文犯泄露之禁可不深慎可不深慎李君曰至其日入靜室密處燒香北向五再拜心呼五星上真皇君君夫人名字三過畢叩齒五通畢解巾長跪謹啓五星日月上皇高真道君道君夫人玊清太上上清上皇上帝大道聖君几前因自陳七祖父母以下下及一身千罪萬過上世以來乞得解脫三官告下天帝使罪名離釋削除黑簡乞願得與五星之真俱奔華晨上登上清交行玉門當憶所犯之過根具列罪狀之多少任意自陳辭誠若至唯使殫盡此日謝過徑聞大上是太上之吉會天仙之慶上皇日也群真上帝以此日並獻龍衣鳯帔虎帶飛裳於上皇是為寶重其日解脫刑名也不知此五通日者不得從解罪之例也夫學真者當恆行之又當隱忌其日勿令有知者後聖李君曰當以其日思存吉事心願飛仙勿有百憂使精魂悲慘立德惠施賑救窮匱行功布恩勿行威罰此太上之吉日也太上以其日遣玉童玉女密察學道者之誠子未言之意意有善惡之心皆巳知當剌聞於上皇當其日也清齋為善要言矣後聖李君具受玄教施行道成時乘八景之輿上登上清宫受書為金闕帝君臨去之日及手書五星中皇上真道君君夫人諱字及太上五通吉日以白玉為簡丹玉書之一通封以雲蘂之函印以三光之章以付西嶽華隂山素石笥之內又刻題笥上其文曰天地之寶珍名山之絶藏又書一通以青玊為簡黃玊書之封以鳯玊之函印以朝真之章以付東嶽泰山青石笥之內又刻題笥上其文曰十天之奧章上靈之幽窟又書一通以玄玉為簡碧玊書之封以瓊剛之函印以太玄之章以付南嶽衡山黃石笥之內又刻題笥上其文曰八玄之高寶上真之靈囿又書一通以黃金為簡青玊書之封以朱琳之函印以高皇之章以付北嶽恆山白石笥之內又刻題笥上其文曰七靈之上道太真之殊宫又書一通以碧玉為簡黃金書之封以文琅之函印以中黃之章以付中嶽嵩高山玄石笥之內又刻題笥上其文曰九天之别藏五嶽之府淵又書一通各付五嶽使五嶽君領守之焉須壬辰吉會聖君來下當命召五嶽出此笥書以付上相四輔使教上真之才也又書一通以白素之紋八色之綵筆自而書之差次祝説為致真之法吐納進退求登五辰之道分書五通使解罪咎之日題之曰八素真經太上之隱書也以付太虛真人南嶽赤君使下授學道宿有真金玉字刻在金閣當為真人者不得越傳於地仙也有得太上八素隱書者皆玄録著於紫宫玊名刋于上清當受命為真人故得之也俗世之人千萬之中誤有一人為天神所授以得此經或得而不行者皆因緣傳驛為上真之使耳子無疑焉雖受而不行故當為尸解之仙但當不得作飛仙真人耳尸解之後自復漸令涉高妙之塗悟其迷網之心也但用年歲是為小久而反真超迹矣子其朂哉子其隱哉太虛真人受教而下告曰此太上之靈文登晨之妙道也七百年聽三傳上宰王君曰百年之內有二人可授及得真靈之感應者亦授之要在七百年內唯聽三傳而已皆清齋七日乃付此經受者亦然又當歃盟告誓以啓其心其受行五星致上真之道者𧵥有經之師白絹四十尺銀鐶二雙受修五通之事者𧵥有經之師青布三十二尺為終身切血不泄之約不漏之信於是三官徑奏天帝天帝上請玉女給受書者徑奏上清上清上請玉童給侍八素之靈文也各三十二人並司有書者之過記有書者之功勤纎芥毫釐輒剌上宫其非人而授限過而出露言隱書宣泄吉日不奉盟誓不信祕言皆犯四極明科泄閉之罪三祖父母獲考三官身為下鬼摙濛山之石副諸五嶽汲冥海之水灌諸四瀆身無仙冀而七考地獄子於傳授之際修行之時深當精慎每為寶祕太上告李君殷勤者恐其失道故也又此經上有五皇上真道君君夫人之諱字及五通之日不宜令含生者知之增為祕隱之煩重也後聖李君曰子處俗在家未修至道者恐世上百邪千妖百魔犯子神氣者但以夜半時向五方先閉氣五過各隂祝吾刻五嶽石笥上文三過從西嶽白玊為簡餘四嶽又以書一通始不得及白素之篇也祝之三過三過祝畢叩齒三十六下除百邪拘三魂制七魄也此之祝説非外舍之道經云云此語無章句也百邪三魂七魄亦不畏此矣夫道之妙祕真玄絶衆外題猶能制百邪檢魂魄况其石笥中所寶上者乎百鬼萬精千邪衆妖皆行走名山為諸靈驅使皆見五嶽李君石笥上刻題之文但為不知笥內是何道之經文耳道士宜恆祝此刻文諸鬼輩謂人當修笥內之經故致畏懼而不敢近也太虛真人口訣太虛真人曰先師見教以五通日日出三四丈許正立以心對日存三魂神與日光俱入心中良久閉氣三息咽液三過微祝曰太陽散輝垂光紫青來入我魂照我五形却鬼試心使心平正內徹九氣外通胎命飛仙上清玉籙已定祝畢以手拭目二七叩齒二七都畢此法使人三魂凝明丹心方正萬邪藏術心試不行真要道也子當常行之諸以五通日向日趣令嚏若不得嚏以軟物向日引導鼻中亦即嚏也嚏即祝曰天光來進六胎上通三魂守神七魄不亡承日鳴嚏與日同光飛仙上清位為真公祝畢拭目二十七是內精上交日光三魂發明於內使人心開神解百精流轉於內府也若非五通日可不須爾也又春乙卯日夏丙午日秋庚申日冬壬子日冥卧時先搗朱砂雄黃雌黃三物分等細搗之以綿褁之使如大臨卧時以塞兩耳中此消三尸鍊七魄之道祕法也勿令有知者矣明日日中時以東流水洗浴畢更飾床席易著衣服浣故者更著履而洗澡之却又灑掃於所寢床下通令所住一室盛潔也更安枕卧向上閉氣握固良久而微祝曰天道有常攺易故新上帝吉日沐浴為真三氣消尸朱黃安魂寶鍊七魄與我相親祝畢此道是消錬尸穢之上法攺易新形之要訣也四時唯各取一日為之耳受經布𧵥每令精上玉童玉女皆察看取與處所審心訣之根盡與不盡也子當識此處意旨矣受𧵥者慎無私散以營飢寒犯之者身沒三官為下濁之鬼三官又當以此之罪加咎於三祖此太上之盟誓裂血之寶約矣身入名山當仙之日皆當投之川林岫室之間或賑散山栖之夫矣若殁經太隂者臨去若無靈告感應使有所付皆當抱以自隨受書亦然其時玄中亦必致夢想之驗上真玉童照以形言之信自當處分審其所宜矣上清太上八素真經
